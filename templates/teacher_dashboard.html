<!DOCTYPE html>
<html>
<head>
    <title>Teacher Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="container">

    <div class="header">
        <h1>Teacher Dashboard</h1>
    </div>

    <div class="card">
        <h2>Current Status</h2>
        <p><strong>Status:</strong> {{ status_row.status if status_row else "Not Set" }}</p>
        <p><strong>Location:</strong> {{ status_row.location if status_row else "Not Set" }}</p>
    </div>

    <div class="card">
        <h2>Update Your Status</h2>

        <form method="POST" action="/update_status">
            <label>Status</label>
            <select name="status">
                <option>Available</option>
                <option>Busy</option>
                <option>In Class</option>
            </select>

            <label>Location</label>
            <select name="location">
                <option>Cabin</option>
                <option>Lecture Hall</option>
                <option>Lab</option>
            </select>

            <button class="btn" type="submit">Update Status</button>
        </form>
    </div>

    <a href="/logout" class="btn btn-danger">Logout</a>

</div>

</body>
</html>
