<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="container">

    <div class="header">
        <h1>Admin Dashboard</h1>
    </div>

    <div class="card">
        <h2>Add Teacher</h2>

        <form method="POST" action="/add_teacher">
            <label>Name</label>
            <input name="name" required>

            <label>Email</label>
            <input name="email" required>

            <label>Password</label>
            <input type="password" name="password" required>

            <button class="btn">Add Teacher</button>
        </form>
    </div>

    <div class="card">
        <h2>Add Location</h2>

        <form method="POST" action="/add_location">
            <label>Location Name</label>
            <input name="name" required>

            <label>Building</label>
            <input name="building" required>

            <label>Floor</label>
            <input name="floor" required>

            <label>Room Number</label>
            <input name="room_number" required>

            <label>X Coordinate</label>
            <input name="x" required>

            <label>Y Coordinate</label>
            <input name="y" required>

            <button class="btn">Add Location</button>
        </form>
    </div>

    <a href="/logout" class="btn btn-danger">Logout</a>

</div>

</body>
</html>
