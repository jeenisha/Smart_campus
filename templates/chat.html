<h1>Smart Campus Chatbot</h1>

<div style="border:1px solid black; padding:10px; width:60%;">
    {% if messages %}
        {% for m in messages %}
            <p><b>{{ m.role }}:</b> {{ m.text }}</p>
        {% endfor %}
    {% else %}
        <p><i>Ask me something like:</i></p>
        <p>• Is ABC available?</p>
        <p>• Where is ABC?</p>
    {% endif %}
</div>

<br>

<form method="POST">
    <input type="text" name="user_message" style="width:60%;" placeholder="Type your question here..." required>
    <br><br>
    <button type="submit">Send</button>
</form>

<br>
<a href="/">⬅ Back to Home</a>
